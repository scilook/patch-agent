name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-frontend:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node env info
        run: node --version && npm --version

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install frontend deps
        working-directory: ./dashboard
        run: npm ci

      - name: Run frontend lint (ESLint)
        working-directory: ./dashboard
        run: |
          npm ci
          npx eslint "src/**/*.{js,jsx}"

      - name: Run Prettier check
        working-directory: ./dashboard
        run: npx prettier --check "src/**/*.{js,jsx,css}"

      - name: Build frontend
        working-directory: ./dashboard
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist

  build-deb:
    name: Build Debian package
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install flake8
        run: python -m pip install --upgrade pip && pip install flake8

      - name: Run Python lint (flake8)
        run: flake8 vuln-patch-agent_0.1.0/usr/lib/vuln-patch-agent

      - name: Show dpkg version
        run: dpkg --version || true

      - name: Build .deb
        run: |
          set -e
          dpkg-deb --build vuln-patch-agent_0.1.0
          ls -l vuln-patch-agent_0.1.0.deb || true

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: vuln-patch-agent-deb
          path: vuln-patch-agent_0.1.0.deb
